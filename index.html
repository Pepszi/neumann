<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Neumann</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&family=Tomorrow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./dist/output.css">
</head>
<body>
	<section>
		<div class="mx-auto flex w-full max-w-6xl justify-center gap-5 px-6 py-12">
			<div class="sticky top-6 self-start border-t border-l border-black p-5">
				<span id="chapter-label" class="block font-heading text-[1.25rem] font-medium uppercase leading-none tracking-[0.2em] align-middle text-accent [writing-mode:vertical-rl] rotate-180 [text-box:trim-both_cap_alphabetic]">Chapter 1</span>
			</div>

			<div class="w-full max-w-[37.625rem]">
				<article id="article-panel" role="tabpanel" tabindex="0" aria-labelledby="" class="space-y-5 pt-5 pr-5 border-t border-r border-black"></article>
			</div>

			<div class="sticky top-6 flex shrink-0 flex-col gap-6 self-start">
				<p class="font-sans text-[0.875rem] font-semibold leading-[1.1] tracking-normal">Read more<br>chapters</p>

				<nav
					id="article-tabs"
					role="tablist"
					aria-label="Articles"
					aria-orientation="vertical"
					class="flex flex-col items-start gap-3 text-left"
				></nav>
			</div>
		</div>
	</section>

	<script src="./js/main.js" defer></script>
</body>
</html>
